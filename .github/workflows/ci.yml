name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Run pre-commit (all files)
        run: python -m pre_commit run --all-files

  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install security tools
        run: pip install bandit pip-audit

      - name: Run bandit (static analysis)
        run: |
          if find src -name "*.py" 2>/dev/null | grep -q .; then
            bandit -r src -ll
          else
            echo "No Python source files in src/ — skipping bandit."
          fi

      - name: Run pip-audit (dependency CVE scan)
        run: pip-audit --desc

  test:
    name: Test & coverage
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        id: run-tests
        run: |
          if find tests -name "test_*.py" | grep -q .; then
            python -m pytest -q --tb=short
          else
            echo "No test files found — skipping pytest."
          fi
        continue-on-error: true

      - name: Open GitHub issue on test failure
        if: steps.run-tests.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const title = `CI: tests failed on ${context.ref.replace('refs/heads/','')} (${context.sha.slice(0,7)})`;
            const body = [
              `Automated CI detected failing tests for commit ${context.sha}.`,
              ``,
              `**Branch:** \`${context.ref}\``,
              `**Workflow run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['ci-failure'],
            });
            core.setFailed('Tests failed — issue created.');

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
          if-no-files-found: ignore
