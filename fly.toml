# Fly.io configuration for Office Hero Admin Web

app = "office-hero-admin-web"
primary_region = "sjc"

[build]
  builder = "pacer"

  [build.args]
    NODE_ENV = "production"

[env]
  VITE_API_BASE_URL = "https://api.office-hero.fly.dev"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true

  [http_service.concurrency]
    type = "fixed"
    hard_limit = 100
    soft_limit = 80

  [[http_service.checks]]
    grace_period = "10s"
    interval = 10000
    method = "get"
    path = "/"
    protocol = "http"
    timeout = 2000
    tls_server_name = ""

[metrics]
  port = 9090
