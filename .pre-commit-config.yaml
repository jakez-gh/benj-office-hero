# Pre-commit hooks for benj.office-hero
# Install: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files

repos:
  # Markdown linting + auto-fix
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.43.0
    hooks:
      - id: markdownlint
        args: [--fix, --ignore, node_modules]

  # Python code formatting
  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        language_version: python3.11
        args: [--line-length=100]

  # CVE scanning on every commit as well as push
  - repo: local
    hooks:
      - id: pip-audit
        name: pip-audit dependency scan
        entry: python -m pip_audit --exit-zero
        language: system
        pass_filenames: false
        always_run: true
        stages: [commit-msg, pre-push]

  # Python linting + import sorting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]

  # General file hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: [--fix=lf]
        exclude: '\.(ps1|bat)$'
      - id: detect-private-key

  # Security scan + tests — run on push (slow; skip with SKIP=bandit,pytest-check)
  - repo: local
    hooks:
      - id: bandit
        name: bandit security scan
        entry: python -m bandit -r src -ll
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      - id: pip-audit
        name: pip-audit dependency scan
        entry: python -m pip_audit --exit-zero
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      - id: pytest-check
        name: pytest (TDD gate)
        entry: python -m pytest --tb=short -q
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
