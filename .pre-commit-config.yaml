# Pre-commit hooks for benj.office-hero
# Install: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files

repos:
  # Markdown linting + auto-fix
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.43.0
    hooks:
      - id: markdownlint
        args: [--fix, --ignore, node_modules]

  # Python code formatting
  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        args: [--line-length=100]

  # CVE scanning on push only (slow; skip with SKIP=pip-audit)
  - repo: local
    hooks:
      - id: pip-audit
        name: pip-audit dependency scan
        entry: bash -c '.venv/bin/python -m pip_audit --desc'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

  # Python linting + import sorting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]

  # Node tooling for frontend versioning and dev server management
  - repo: local
    hooks:
      - id: bump-version
        name: bump semver patch
        entry: node scripts/bump-version.js
        language: node
        additional_dependencies: ['semver']
        pass_filenames: false
        stages: [pre-commit]
      - id: restart-frontend
        name: restart frontend dev server
        entry: node scripts/restart-frontend.js
        language: node
        additional_dependencies: ['kill-port']
        pass_filenames: false
        stages: [post-commit]

  # General file hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: '^(docs/llm/.*|apps/admin-web/demo-recording\.ts|apps/admin-web/playwright\.config\.ts|apps/admin-web/src/e2e/login\.spec\.ts)$'
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: [--fix=lf]
        exclude: '\.(ps1|bat)$'
      - id: detect-private-key

  # Security scan + tests — run on push (slow; skip with SKIP=bandit,pytest-check)
  - repo: local
    hooks:
      - id: bandit
        name: bandit security scan
        entry: bash -c '.venv/bin/python -m bandit -r src -ll'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      - id: pytest-check
        name: pytest (TDD gate)
        entry: bash -c '.venv/bin/python -m pytest --tb=short -q'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
